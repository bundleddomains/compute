<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Colored Pencil Body</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }

  .pencil {
    position: absolute;
    left: 0;
    top: 0;

    width: 300px;
    height: 34px;

    border-radius: 0 999px 999px 0;

    background:
      linear-gradient(
        to bottom,
        rgba(255,255,255,0.55) 0%,
        rgba(255,255,255,0.18) 18%,
        rgba(0,0,0,0.05) 52%,
        rgba(0,0,0,0.14) 100%
      ),
      linear-gradient(
        to right,
        #7f5aa8 0%,
        #8d68b5 18%,
        #9c77c2 52%,
        #7b56a4 100%
      );

    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.45),
      inset 0 -2px 4px rgba(0,0,0,0.12);

    transform: rotate(-8deg);
    transform-origin: left center;
  }

  .pencil::before {
    content: "";
    position: absolute;
    left: 18px;
    right: 18px;
    top: 6px;
    height: 5px;

    border-radius: 0 999px 999px 0;
    background: rgba(255,255,255,0.28);
  }

  .pencil::after {
    content: "";
    position: absolute;
    left: 28px;
    right: 28px;
    bottom: 5px;
    height: 4px;

    border-radius: 0 999px 999px 0;
    background: rgba(0,0,0,0.08);
  }
</style>
</head>

<body>
  <div class="pencil"></div>
</body>
</html>
