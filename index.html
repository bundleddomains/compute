<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTMLO Canvas</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    #pasteWrap {
      display: none;
    }
  </style>
</head>

<body>
  <div id="canvas" class="canvas">

    <div id="pasteWrap" class="paste-wrap hidden">
      <div class="paste-title">Paste Code</div>
      <textarea
        id="pasteField"
        class="paste-field"
        spellcheck="false"
      ></textarea>
    </div>

    <pre id="codeView" class="code-view hidden"></pre>

    <!-- LEFT SIDE (revolving system) -->
    <div id="scene" class="scene">
      <div id="stack" class="stack"></div>
    </div>

    <!-- RIGHT SIDE (empty panel) -->
    <div id="rightPanel" class="right-panel"></div>

    <div id="status" class="status">Loaded</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
