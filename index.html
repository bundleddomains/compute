<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTMLO Canvas</title>

  <script>
    // 🔥 ONE version for everything
    const VERSION = Date.now();

    // CSS
    const css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = "styles.css?v=" + VERSION;
    document.head.appendChild(css);
  </script>
</head>

<body>
  <div id="canvas" class="canvas">

    <pre id="codeView" class="code-view hidden"></pre>

    <div id="scene" class="scene">
      <div id="stack" class="stack">

        <!-- soft background luhv -->
        <div class="luhv-bg">
          <span>luhv</span>
        </div>

        <!-- front rat artwork -->
        <div class="front-photo-wrap">
          <img src="IMG_6157.jpeg" class="front-photo" alt="DFI photo">
        </div>

        <!-- center replace & erase -->
        <div class="center-title">

          <div class="center-word word-replace">
            REPLACE
          </div>

          <div class="center-word word-and">
            AND
          </div>

          <div class="center-word word-erase">
            ERASE
          </div>

        </div>

      </div>
    </div>

    <div id="status" class="status">Ready</div>
  </div>

  <script>
    // JS (same version as CSS)
    const script = document.createElement("script");
    script.src = "app.js?v=" + VERSION;
    document.body.appendChild(script);
  </script>
</body>
</html>
