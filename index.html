<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTMLO Canvas</title>

  <script>
    const VERSION = Date.now();

    const css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = "styles.css?v=" + VERSION;
    document.head.appendChild(css);
  </script>
</head>

<body>
  <div id="canvas" class="canvas">

    <pre id="codeView" class="code-view hidden"></pre>

 <div id="scene" class="scene">

  <!-- pictures stay visible because app.js does not erase this -->
  <div class="front-art-layer">
    <img src="8BF5090B-20B8-4FB0-8746-8F78CBF53728.png" class="front-art front-art-rat" alt="Erased rainbow rat">
    <img src="IMG_6157.jpeg" class="front-art front-art-photo" alt="DFI photo">
  </div>

  <!-- new image under the middle one -->
  <div class="bottom-art-layer">
    <img src="2EC05E17-49A0-4131-A927-473282E0DD8F.jpeg" class="bottom-art" alt="Bottom artwork">
  </div>

  <!-- app.js can keep controlling this -->
  <div id="stack" class="stack"></div>

</div>

    <div id="status" class="status">Ready</div>
  </div>

  <script>
    const script = document.createElement("script");
    script.src = "app.js?v=" + VERSION;
    document.body.appendChild(script);
  </script>
</body>
</html>
