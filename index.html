<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTMLO Canvas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="canvas" class="canvas">
    <div id="pasteWrap" class="paste-wrap">
      <div class="paste-title">Paste Code</div>
      <textarea
        id="pasteField"
        class="paste-field"
        spellcheck="false"
        placeholder="Paste HTML, CSS, JS, SVG, or a mixed document..."
      ></textarea>
    </div>

    <div id="workspace" class="workspace hidden">
      <div class="viewer-wrap">
        <div class="viewer-header">
          <div id="viewerTitle" class="viewer-title">CODE VIEWER</div>
        </div>
        <pre id="codeViewer" class="code-viewer">Tap the front panel to view its saved code.</pre>
      </div>

      <div id="scene" class="scene">
        <div id="stack" class="stack"></div>
      </div>
    </div>

    <div id="status" class="status">Paste code to begin</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
