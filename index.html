<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTMLO Canvas</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .paste-wrap {
      padding-bottom: 18px;
    }

    .module-preview-wrap {
      display: flex;
      gap: 14px;
      margin-top: 14px;
      min-height: 180px;
    }

    .module-card {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(120,120,120,0.14);
      border-radius: 18px;
      background: rgba(255,255,255,0.42);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .module-label {
      padding: 12px 14px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(40,40,40,0.58);
      border-bottom: 1px solid rgba(120,120,120,0.10);
    }

    .module-frame {
      width: 100%;
      height: 180px;
      border: 0;
      display: block;
      background: transparent;
    }

    @media (max-width: 700px) {
      .module-preview-wrap {
        flex-direction: column;
      }

      .module-frame {
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas" class="canvas">
    <div id="pasteWrap" class="paste-wrap">
      <div class="paste-title">Paste Code</div>

      <textarea
        id="pasteField"
        class="paste-field"
        spellcheck="false"
        placeholder="Paste HTML, CSS, JS, SVG, or a mixed document..."
      ></textarea>

      <div class="module-preview-wrap">
        <div class="module-card">
          <div class="module-label">Body</div>
          <iframe
            class="module-frame"
            src="body.html"
            title="Pencil body preview"
            loading="lazy"
          ></iframe>
        </div>

        <div class="module-card">
          <div class="module-label">Tip</div>
          <iframe
            class="module-frame"
            src="tip.html"
            title="Pencil tip preview"
            loading="lazy"
          ></iframe>
        </div>
      </div>
    </div>

    <pre id="codeView" class="code-view hidden"></pre>

    <div id="scene" class="scene hidden">
      <div id="stack" class="stack"></div>
    </div>

    <div id="status" class="status">Paste code to begin</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
