<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pencil Tip</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }

  .tip-wrap {
    position: absolute;
    left: 0;
    top: 0;

    width: 140px;
    height: 60px;

    transform: rotate(-8deg);
    transform-origin: right center;
  }

  .wood {
    position: absolute;
    inset: 0;

    /* flipped to match body direction */
    clip-path: polygon(0 0, 0 100%, 100% 50%);
    background: #d6b38a;
  }

  .lead {
    position: absolute;
    right: 0;
    top: 50%;

    width: 28px;
    height: 16px;

    transform: translateY(-50%);

    clip-path: polygon(0 0, 0 100%, 100% 50%);
    background: #2f2f35;
  }
</style>
</head>

<body>
  <div class="tip-wrap">
    <div class="wood"></div>
    <div class="lead"></div>
  </div>
</body>
</html>
